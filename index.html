<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>손잡고 기도해요</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Do+Hyeon&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<section id="screen-home" class="screen active">
  <div class="home-inner">
    <h1 class="home-title">손잡고 기도해요</h1>
    <p class="home-subtitle">학년을 선택해서 함께 기도해요</p>

    <div class="grade-grid">
      <button class="grade-btn" data-grade="1">1학년</button>
      <button class="grade-btn" data-grade="2">2학년</button>
      <button class="grade-btn" data-grade="3">3학년</button>
      <button class="grade-btn" data-grade="4">4학년</button>
      <button class="grade-btn" data-grade="5">5학년</button>
      <button class="grade-btn" data-grade="6">6학년</button>
    </div>

    <button class="random-btn" id="random-btn">
      <span class="random-icon">🎲</span> 랜덤으로 기도하기
    </button>
  </div>
</section>

<section id="screen-viewer" class="screen">
  <div class="viewer" id="viewer">
    <div class="viewer-backdrop" id="viewer-backdrop"></div>

    <div class="name-label" id="name-label"></div>

    <div class="image-wrap" id="image-wrap">
      <div class="carousel-track" id="carousel-track">
        <div class="carousel-slide" id="slide-prev">
          <img class="child-photo" id="photo-prev" alt="">
        </div>
        <div class="carousel-slide" id="slide-current">
          <img class="child-photo" id="photo-current" alt="">
        </div>
        <div class="carousel-slide" id="slide-next">
          <img class="child-photo" id="photo-next" alt="">
        </div>
      </div>
    </div>

    <div class="hand-guide" id="hand-guide" aria-hidden="true">
      <svg viewBox="0 0 800 1000">
        <g transform="translate(400 520) rotate(-8)">
          <path d="M -60 180 C -100 180 -110 100 -108 20 L -108 -80 C -108 -105 -70 -105 -70 -80
                   L -70 -20 L -70 -220 C -70 -250 -30 -250 -30 -220 L -30 -40 L -30 -260
                   C -30 -292 22 -292 22 -260 L 22 -40 L 22 -240 C 22 -270 62 -270 62 -240
                   L 62 20 L 90 -60 C 100 -90 138 -78 128 -46 L 96 100 C 90 150 40 180 -10 182 Z"
            fill="none" stroke="#ffffff" stroke-width="14" stroke-linejoin="round"
            stroke-linecap="round" stroke-dasharray="18 14"/>
        </g>
      </svg>
    </div>

    <div class="prayer-text" id="prayer-text"></div>

    <button class="home-btn" id="home-btn" aria-label="홈으로">
      <span class="home-icon">🏠</span>
    </button>

    <span class="chevron chevron-left" id="chevron-left" aria-hidden="true">‹</span>
    <span class="chevron chevron-right" id="chevron-right" aria-hidden="true">›</span>

    <div class="progress-dots" id="progress-dots"></div>
  </div>
</section>

<script src="js/utils.js"></script>
<script src="js/dataLoader.js"></script>
<script src="js/gestures.js"></script>
<script src="js/viewer.js"></script>
<script src="js/router.js"></script>
<script src="js/main.js"></script>
</body>
</html>
